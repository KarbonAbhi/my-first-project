<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abhishek Kar</title>
  <style>
    body {
      background-color: #fdf8f0;
      font-family: Georgia, serif;
      margin: 0;
      padding: 60px 20px;
      text-align: center;
    }

    h1 {
      color: #1a4a8a;
      font-size: 3rem;
      margin: 0 0 20px;
    }

    p.bio {
      color: #777;
      font-size: 1.1rem;
      max-width: 520px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 24px;
    }

    .links a {
      color: #1a4a8a;
      text-decoration: none;
      font-size: 1rem;
      border-bottom: 1px solid #1a4a8a;
      padding-bottom: 2px;
    }

    .links a:hover {
      color: #0d2e5e;
      border-bottom-color: #0d2e5e;
    }
  </style>
</head>
<body>
  <h1>Abhishek Kar</h1>
  <p class="bio">Based in Dubai, Engineer, MBA, Strategist and Marketing guy — Exploring Vibe Coding</p>
  <div class="links">
    <a href="https://twitter.com/" target="_blank">Twitter</a>
    <a href="https://instagram.com/" target="_blank">Instagram</a>
    <a href="https://linkedin.com/" target="_blank">LinkedIn</a>
  </div>
</body>
</html>
